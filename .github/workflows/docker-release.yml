name: docker-release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t rainbow:ci .

      - name: Export static binary
        run: |
          mkdir -p dist
          sh ./export-static.sh rainbow:ci ./dist/rainbow-linux-amd64

      - name: Smoke test exported binary
        run: ./dist/rainbow-linux-amd64 --prescan_only

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: rainbow-linux-amd64
          path: dist/rainbow-linux-amd64
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/rainbow-linux-amd64 --clobber
          else
            gh release create "$TAG_NAME" dist/rainbow-linux-amd64 --generate-notes --title "$TAG_NAME"
          fi
