name: docker-release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rainbow:ci .

      - name: Export static binary
        run: |
          mkdir -p dist
          sh ./export-static.sh rainbow:ci ./dist/rainbow-linux-amd64

      - name: Smoke test exported binary
        run: ./dist/rainbow-linux-amd64 --prescan_only

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow-linux-amd64
          path: dist/rainbow-linux-amd64
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rainbow-linux-amd64
          generate_release_notes: true
